<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>South Sweden Sales Leads SkamoWall</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --installer: #eb7a00;
      --housing: #18864b;
      --distributor: #2563eb;
      --ink: #17202a;
      --muted: #5f6c7b;
      --line: #d7dee6;
      --panel: #ffffff;
      --bg: #eef3f6;
      --a1: #ffc857;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      background: linear-gradient(180deg, #fff 0%, #f7f9fb 100%);
      border-right: 1px solid var(--line);
      padding: 20px 18px 28px;
      height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .kicker {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--installer);
      margin-bottom: 6px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.1;
    }

    .sub {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 6px 18px rgba(16, 24, 40, 0.04);
    }

    .controls label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 14px;
      cursor: pointer;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      display: inline-block;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover { background: #f4f7fa; }

    .lead-list {
      display: grid;
      gap: 10px;
    }

    .lead-filters {
      display: grid;
      gap: 10px;
      margin-top: 12px;
      margin-bottom: 12px;
    }

    .filter-field label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .filter-input,
    .filter-select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      padding: 9px 10px;
      font-size: 13px;
      outline: none;
    }

    .filter-input:focus,
    .filter-select:focus {
      border-color: rgba(235, 122, 0, 0.55);
      box-shadow: 0 0 0 3px rgba(235, 122, 0, 0.10);
    }

    .lead-empty {
      border: 1px dashed var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 16px 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }

    .lead-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 12px;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
    }

    .lead-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(16, 24, 40, 0.06);
    }

    .lead-item.active {
      border-color: var(--installer);
      box-shadow: 0 0 0 3px rgba(235, 122, 0, 0.14);
    }

    .lead-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.a1 {
      background: rgba(255, 200, 87, 0.25);
      color: #6f4c00;
    }

    .badge.a2 {
      background: rgba(235, 122, 0, 0.12);
      color: #8a4600;
    }

    .badge.b1 {
      background: rgba(24, 134, 75, 0.12);
      color: #15643a;
    }

    .badge.c1 {
      background: rgba(37, 99, 235, 0.12);
      color: #1d4ed8;
    }

    .lead-name {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .lead-meta {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    .map-shell {
      position: relative;
      height: 100vh;
      min-height: 100vh;
      background: #dfe6ec;
      overflow: hidden;
    }

    #map {
      position: absolute;
      inset: 0;
      height: 100%;
      width: 100%;
    }

    .map-controls {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 900;
      width: min(220px, calc(100% - 20px));
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(215, 222, 230, 0.95);
      border-radius: 12px;
      padding: 10px 10px 8px;
      box-shadow: 0 10px 28px rgba(16, 24, 40, 0.08);
      backdrop-filter: blur(8px);
    }

    .map-controls strong {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .map-controls label {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .map-controls .dot {
      width: 10px;
      height: 10px;
    }

    .detail-panel {
      position: absolute;
      top: 0;
      right: 0;
      z-index: 880;
      width: min(360px, 42vw);
      height: 100%;
      background: rgba(255, 255, 255, 0.98);
      border-left: 1px solid rgba(215, 222, 230, 0.95);
      box-shadow: -14px 0 30px rgba(16, 24, 40, 0.12);
      transform: translateX(100%);
      transition: transform 0.22s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .detail-panel.open {
      transform: translateX(0);
    }

    .detail-head {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(247, 249, 251, 0.96);
    }

    .detail-back {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    .detail-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .detail-empty {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      padding-top: 6px;
    }

    .detail-title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 8px;
    }

    .detail-meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .detail-chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .detail-chip.a1 {
      background: rgba(255, 200, 87, 0.25);
      color: #6f4c00;
    }

    .detail-chip.a2 {
      background: rgba(235, 122, 0, 0.12);
      color: #8a4600;
    }

    .detail-chip.b1 {
      background: rgba(24, 134, 75, 0.12);
      color: #15643a;
    }

    .detail-chip.c1 {
      background: rgba(37, 99, 235, 0.12);
      color: #1d4ed8;
    }

    .detail-block {
      margin-top: 14px;
      font-size: 13px;
      line-height: 1.5;
    }

    .detail-block b {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .detail-link {
      color: #1d4ed8;
      text-decoration: none;
      word-break: break-word;
    }

    .detail-link:hover {
      text-decoration: underline;
    }

    .leaflet-popup-content {
      width: 300px;
      margin: 12px 14px;
      line-height: 1.45;
      font-size: 13px;
    }

    .popup-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .popup-meta {
      color: var(--muted);
      margin-bottom: 10px;
      font-size: 12px;
    }

    .popup-block {
      margin-top: 8px;
    }

    .popup-block b {
      display: block;
      margin-bottom: 2px;
    }

    .leaflet-control-attribution {
      font-size: 10px;
      color: #61707f;
      background: rgba(255, 255, 255, 0.82);
      border-radius: 8px 0 0 0;
      padding: 2px 6px;
    }

    @media (max-width: 520px) {
      body {
        height: auto;
        overflow: auto;
      }
      .app {
        grid-template-columns: 1fr;
        height: auto;
        overflow: visible;
      }
      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--line);
        height: auto;
        max-height: 48vh;
      }
      .map-shell {
        height: 52vh;
        min-height: 52vh;
      }
      .map-controls {
        width: min(210px, calc(100% - 16px));
        top: 8px;
        left: 8px;
      }
      .detail-panel {
        width: 100%;
      }
    }
  </style>
</head>

rchant access in Gothenburg can support installer discovery, future stocking discussions and practical rollout support for SkamoWall.","lat":57.7257561,"lng":11.9955272},{"priority":41,"tierCode":"C1","tierLabel":"Distributor","group":"distributor","category":"Distributor / merchant","country":"Sweden","name":"Optimera Lund","region":"Lund / Skåne","city":"Lund","municipality":"Lund Municipality","areaGroup":"Skane","street":"Skiffervägen 26A","postcode":"224 78","email":"lund@optimera.se","phone":"046-19 60 50","website":"https://www.optimera.se/butiker/27","googleMaps":"https://www.google.com/maps/search/?api=1\u0026query=Optimera%20Lund%2C%20Skifferv%C3%A4gen%2026A%2C%20224%2078%2C%20Lund%2C%20Sweden","what":"Trade branch in Lund supplying construction materials, building products and contractor support to the local market.","reason":"Included because Lund distribution coverage strengthens the southern Sweden rollout path and gives a practical merchant route for installer introductions and local availability.","lat":55.692636,"lng":13.2230905},{"priority":42,"tierCode":"C1","tierLabel":"Distributor","group":"distributor","category":"Distributor / merchant","country":"Sweden","name":"Optimera Jägersro","region":"Malmö / Skåne","city":"Malmö","municipality":"Malmo Municipality","areaGroup":"Skane","street":"Skrittgatan 1","postcode":"213 77","email":"jagersro@optimera.se","phone":"040-38 18 00","website":"https://www.optimera.se/butiker/13","googleMaps":"https://www.google.com/maps/search/?api=1\u0026query=Optimera%20J%C3%A4gersro%2C%20Skrittgatan%201%2C%20213%2077%2C%20Malm%C3%B6%2C%20Sweden","what":"Large trade branch in Malmö Jägersro supplying building materials, tools and local stock for professional contractors.","reason":"Included because a strong Malmö merchant touchpoint can help with installer referrals, product availability conversations and practical route-to-market support for SkamoWall.","lat":55.5683405,"lng":13.0700414}];
    const colors = {
      installer: '#eb7a00',
      housing: '#18864b',
      distributor: '#2563eb',
      other: '#64748b'
    };

    const state = {
      installer: true,
      housing: true,
      distributor: true,
      area: '',
      search: ''
    };

    const swedenBounds = L.latLngBounds([[55.0, 10.5], [69.3, 24.9]]);
    const swedenGeoJsonUrl = 'https://raw.githubusercontent.com/johan/world.geo.json/master/countries/SWE.geo.json';

    const map = L.map('map', {
      zoomControl: false,
      attributionControl: false,
      scrollWheelZoom: true,
      maxBounds: swedenBounds,
      maxBoundsViscosity: 1.0
    });
    L.control.zoom({ position: 'topright' }).addTo(map);
    L.control.attribution({ position: 'bottomright', prefix: false }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd',
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    }).addTo(map);

    const layers = {
      installer: L.layerGroup().addTo(map),
      housing: L.layerGroup().addTo(map),
      distributor: L.layerGroup().addTo(map)
    };

    const leadList = document.getElementById('lead-list');
    const areaFilter = document.getElementById('filter-area');
    const nameFilter = document.getElementById('filter-name');
    const detailPanel = document.getElementById('detail-panel');
    const detailContent = document.getElementById('detail-content');
    const detailBack = document.getElementById('detail-back');
    const markerLookup = new Map();
    let activeName = null;

    function normalizeText(value) {
      return (value || '')
        .toString()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase()
        .trim();
    }

    function withinSwedenBounds(lat, lng) {
      return lat >= 55.0 && lat <= 69.3 && lng >= 10.5 && lng <= 24.9;
    }

    function addSwedenMask(geojson) {
      const geometry = geojson.type === 'Feature' ? geojson.geometry : geojson;
      const polygons = geometry.type === 'Polygon' ? [geometry.coordinates] : geometry.coordinates;
      const worldRing = [[85, -180], [85, 180], [-85, 180], [-85, -180]];
      const holes = polygons.map((polygon) => polygon[0].map(([lng, lat]) => [lat, lng]));

      L.polygon([worldRing, ...holes], {
        stroke: false,
        fillColor: '#c7cdd4',
        fillOpacity: 0.58,
        interactive: false
      }).addTo(map);

      L.geoJSON(geojson, {
        interactive: false,
        style: {
          color: '#8d9ba8',
          weight: 2,
          fillColor: '#ffffff',
          fillOpacity: 0.08
        }
      }).addTo(map);

      Object.values(layers).forEach((layer) => layer.bringToFront());
    }

    fetch(swedenGeoJsonUrl)
      .then((response) => response.json())
      .then((geojson) => addSwedenMask(geojson))
      .catch(() => {});

    function badgeClass(tierCode) {
      if (tierCode === 'A1') return 'a1';
      if (tierCode === 'A2') return 'a2';
      if (tierCode === 'B1') return 'b1';
      return 'c1';
    }

    function markerRadius(lead) {
      if (lead.tierCode === 'A1') return 10;
      if (lead.group === 'installer') return 8;
      return 7;
    }

    function detailHtml(lead) {
      const contact = [lead.street, lead.postcode + ' ' + lead.city].filter(Boolean).join(', ');
      const email = lead.email ? '<div class="detail-block"><b>Email</b><a class="detail-link" href="mailto:' + lead.email + '">' + lead.email + '</a></div>' : '';
      const phone = lead.phone ? '<div class="detail-block"><b>Phone</b>' + lead.phone + '</div>' : '';
      const maps = lead.googleMaps ? '<div class="detail-block"><b>Google Maps</b><a class="detail-link" href="' + lead.googleMaps + '" target="_blank" rel="noreferrer">Open in Google Maps</a></div>' : '';

      return [
        '<div class="detail-chip ' + badgeClass(lead.tierCode) + '">' + lead.tierLabel + '</div>',
        '<div class="detail-title">' + lead.name + '</div>',
        '<div class="detail-meta">' + lead.category + '<br>' + lead.city + ', ' + lead.region + '</div>',
        '<div class="detail-block"><b>Region</b>' + lead.region + '</div>',
        '<div class="detail-block"><b>Address</b>' + contact + '</div>',
        email,
        phone,
        '<div class="detail-block"><b>Website</b><a class="detail-link" href="' + lead.website + '" target="_blank" rel="noreferrer">' + lead.website + '</a></div>',
        maps,
        '<div class="detail-block"><b>What they do</b>' + lead.what + '</div>',
        '<div class="detail-block"><b>Why prioritised</b>' + lead.reason + '</div>'
      ].join('');
    }

    function visibleLeads() {
      const activeArea = normalizeText(state.area);
      const activeSearch = normalizeText(state.search);

      return leads.filter((lead) => {
        if (!state[lead.group]) return false;
        if (!withinSwedenBounds(lead.lat, lead.lng)) return false;
        if (lead.country !== 'Sweden') return false;
        if (activeArea && normalizeText(lead.areaGroup) !== activeArea) return false;
        if (activeSearch && !normalizeText(lead.name).includes(activeSearch)) return false;
        return true;
      });
    }

    function populateAreaFilter() {
      const areas = Array.from(new Set(
        leads
          .filter((lead) => lead.country === 'Sweden' && lead.areaGroup)
          .map((lead) => lead.areaGroup)
      )).sort((a, b) => a.localeCompare(b, 'sv', { sensitivity: 'base' }));

      areaFilter.innerHTML = '<option value="">All areas</option>';
      areas.forEach((area) => {
        const option = document.createElement('option');
        option.value = area;
        option.textContent = area;
        areaFilter.appendChild(option);
      });
    }

    function scrollActiveItemIntoView() {
      const activeItem = leadList.querySelector('.lead-item.active');
      if (activeItem) {
        activeItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    function openLeadDetail(lead, options = {}) {
      activeName = lead.name;
      detailContent.innerHTML = detailHtml(lead);
      detailPanel.classList.add('open');
      detailPanel.setAttribute('aria-hidden', 'false');
      renderList();

      if (options.flyTo !== false) {
        map.flyTo([lead.lat, lead.lng], lead.group === 'installer' ? 8 : 9, { duration: 0.45 });
      }
    }

    function closeLeadDetail(scrollToList = true) {
      detailPanel.classList.remove('open');
      detailPanel.setAttribute('aria-hidden', 'true');
      if (scrollToList) {
        scrollActiveItemIntoView();
      }
    }

    function fitLeadBounds(bounds, padding) {
      if (!bounds.length) {
        map.fitBounds(swedenBounds, { padding: [24, 24] });
        return;
      }

      map.fitBounds(bounds, { padding });
      map.panInsideBounds(swedenBounds, { animate: false });
    }

    function renderMarkers() {
      Object.values(layers).forEach((layer) => layer.clearLayers());
      markerLookup.clear();
      const bounds = [];

      visibleLeads().forEach((lead) => {
        const marker = L.circleMarker([lead.lat, lead.lng], {
          radius: markerRadius(lead),
          color: lead.tierCode === 'A1' ? '#6f4c00' : colors[lead.group],
          weight: lead.tierCode === 'A1' ? 3 : 2,
          fillColor: lead.tierCode === 'A1' ? '#ffc857' : colors[lead.group],
          fillOpacity: 0.8
        });

        marker.on('click', () => {
          openLeadDetail(lead, { flyTo: false });
        });

        marker.addTo(layers[lead.group]);
        markerLookup.set(lead.name, marker);
        bounds.push([lead.lat, lead.lng]);
      });

      fitLeadBounds(bounds, [36, 36]);
    }

    function renderList() {
      const visible = visibleLeads();
      leadList.innerHTML = '';

      if (!visible.length) {
        leadList.innerHTML = '<div class="lead-empty">No leads match the current area and name filters.</div>';
        return;
      }

      visible.forEach((lead) => {
        const item = document.createElement('div');
        item.className = 'lead-item' + (activeName === lead.name ? ' active' : '');
        item.innerHTML = [
          '<div class="lead-top">',
          '<div class="badge ' + badgeClass(lead.tierCode) + '">' + lead.tierLabel + '</div>',
          '</div>',
          '<div class="lead-name">' + lead.name + '</div>',
          '<div class="lead-meta">' + lead.category + '<br>' + lead.city + ', ' + lead.region + '</div>'
        ].join('');

        item.addEventListener('click', () => {
          openLeadDetail(lead, { flyTo: true });
        });

        leadList.appendChild(item);
      });
    }

    function rerender() {
      const stillVisible = visibleLeads().some((lead) => lead.name === activeName);
      if (!stillVisible) {
        closeLeadDetail(false);
      }
      renderMarkers();
      renderList();
    }

    document.getElementById('toggle-installers').addEventListener('change', (event) => {
      state.installer = event.target.checked;
      rerender();
    });

    document.getElementById('toggle-housing').addEventListener('change', (event) => {
      state.housing = event.target.checked;
      rerender();
    });

    document.getElementById('toggle-distributors').addEventListener('change', (event) => {
      state.distributor = event.target.checked;
      rerender();
    });

    areaFilter.addEventListener('change', (event) => {
      state.area = event.target.value;
      rerender();
    });

    nameFilter.addEventListener('input', (event) => {
      state.search = event.target.value;
      rerender();
    });

    detailBack.addEventListener('click', () => {
      closeLeadDetail(true);
    });

    populateAreaFilter();
    rerender();
  </script>
</body>
</html>
